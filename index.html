<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bokeh Gallery</title>
  <meta name="description" content="Interactive Bokeh plots" />
  <style>
    :root{
      --bg: #0b0c10;
      --panel: #12141b;
      --text: #e8e8ea;
      --muted: #a7a7ad;
      --border: rgba(255,255,255,.10);
      --shadow: 0 12px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --pad: 18px;
      --accent: #7aa2ff;
    }

    @media (prefers-color-scheme: light) {
      :root{
        --bg: #fafafa;
        --panel: #ffffff;
        --text: #111214;
        --muted: #5b5e66;
        --border: rgba(0,0,0,.08);
        --shadow: 0 12px 30px rgba(0,0,0,.10);
        --accent: #2f6bff;
      }
    }

    * { box-sizing: border-box; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% 0%, rgba(122,162,255,.18), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, rgba(255,122,214,.10), transparent 55%),
                  var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap{
      max-width: 980px;
      margin: 48px auto;
      padding: 0 18px 60px;
    }

    header{
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    h1{
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    .sub{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .pill{
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
    }

    .grid{
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .card{
      grid-column: span 6;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      background-color: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
      text-decoration: none;
      color: inherit;
      min-height: 110px;
      position: relative;
    }

    .card:hover{
      transform: translateY(-2px);
      border-color: rgba(122,162,255,.45);
      box-shadow: 0 16px 36px rgba(0,0,0,.25);
    }

    .card:focus-visible{
      outline: 3px solid rgba(122,162,255,.55);
      outline-offset: 2px;
    }

    .inner{
      padding: var(--pad);
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .title{
      font-weight: 650;
      font-size: 16px;
      margin: 0;
    }

    .meta{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .arrow{
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--accent);
      background: rgba(122,162,255,.08);
      margin-top: 2px;
    }

    footer{
      margin-top: 26px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 720px){
      .card{ grid-column: span 12; }
      header{ align-items: flex-start; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Bokeh Gallery</h1>
        <p class="sub">Interactive plots hosted on GitHub Pages.</p>
      </div>
      <div class="pill">Last updated: <span id="updated">—</span></div>
    </header>

    <div class="grid">
      <!-- Copy a card block per plot -->
      <a class="card" href="glass.html">
        <div class="inner">
          <div>
            <p class="title">Glass</p>
            <p class="meta">ND structure embedding • interactive</p>
          </div>
          <div class="arrow" aria-hidden="true">↗</div>
        </div>
      </a>

      <a class="card" href="obesity.html">
        <div class="inner">
          <div>
            <p class="title">Obesity</p>
            <p class="meta">Clusters, performance regions</p>
          </div>
          <div class="arrow" aria-hidden="true">↗</div>
        </div>
      </a>

      <a class="card" href="education.html">
        <div class="inner">
          <div>
            <p class="title">Education</p>
            <p class="meta">7-class dataset exploration</p>
          </div>
          <div class="arrow" aria-hidden="true">↗</div>
        </div>
      </a>

      <!-- Example extra card -->
      <a class="card" href="other_plot.html">
        <div class="inner">
          <div>
            <p class="title">Other plot</p>
            <p class="meta">Add a short description</p>
          </div>
          <div class="arrow" aria-hidden="true">↗</div>
        </div>
      </a>
    </div>
  </div>

  <script>
    // lightweight "last updated" label using build time (client-side)
    const d = new Date(document.lastModified);
    const fmt = d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "2-digit" });
    document.getElementById("updated").textContent = isNaN(d) ? "—" : fmt;
  </script>
</body>
</html>
