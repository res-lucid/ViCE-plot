<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simulation Gallery</title>
  <style>
    :root{
      --bg:#0b0c10;
      --panel:#12141b;
      --text:#e8e8ea;
      --muted:#a7a7ad;
      --border:rgba(255,255,255,.10);
      --radius:16px;
      --accent:#7aa2ff;
    }

    @media (prefers-color-scheme: light){
      :root{
        --bg:#fafafa;
        --panel:#ffffff;
        --text:#111214;
        --muted:#5b5e66;
        --border:rgba(0,0,0,.08);
        --accent:#2f6bff;
      }
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.5;
    }

    .wrap{
      max-width:760px;
      margin:48px auto;
      padding:0 18px 60px;
    }

    .back{
      display:inline-block;
      margin-bottom:18px;
      color:var(--muted);
      text-decoration:none;
    }

    h1{
      margin:0 0 6px;
      font-size:28px;
    }

    .sub{
      margin:0 0 20px;
      color:var(--muted);
      font-size:14px;
    }

    .panel{
      border:1px solid var(--border);
      background:var(--panel);
      border-radius:var(--radius);
      padding:18px;
    }

    .row{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:12px;
      margin-bottom:12px;
    }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
    }

    input, select{
      width:100%;
      margin-top:6px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      font:inherit;
    }

    .linkbox{
      margin-top:14px;
      padding:12px;
      border:1px solid var(--border);
      border-radius:10px;
      word-break:break-all;
    }

    .linkbox a{
      color:var(--accent);
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../">← Back</a>
    <h1>Simulations</h1>
    <p class="sub">Build a direct link to any simulation HTML.</p>

    <div class="panel">
      <div class="row">
        <label>
          Class folder
          <select id="cls">
            <option value="6-class">6-class</option>
            <option value="7-class">7-class</option>
          </select>
        </label>

        <label>
          Simulation ID
          <select id="simid"></select>
        </label>
      </div>

      <div class="row">
        <label>
          Model
          <select id="model">
            <option value="lr">lr</option>
          </select>
        </label>

        <label>
          Metric
          <select id="metric">
            <option value="var">var</option>
            <option value="bias2">bias2</option>
            <option value="mse">mse</option>
          </select>
        </label>

        <label>
          n
          <select id="n">
            <option value="10000">10000</option>
            <option value="2500">2500</option>
            <option value="1000">1000</option>
            <option value="500">500</option>
            <option value="250">250</option>
          </select>
        </label>
      </div>

      <div class="linkbox">
        <a id="out" href="#">Select a simulation</a>
      </div>
    </div>
  </div>

  <script>
    const SIM_IDS = {
      "6-class": [
        "2667982444",
        "2421311237",
        "996765299"
      ],
      "7-class": [
        "2974012476",
        "996765299",
        "3228988777"
      ]
    };

    const $ = id => document.getElementById(id);

    function fillIds() {
      const cls = $("cls").value;
      const simid = $("simid");
      const ids = SIM_IDS[cls] || [];
      simid.innerHTML = ids.map(x => `<option value="${x}">${x}</option>`).join("");
    }

    function updateLink() {
      const cls = $("cls").value;
      const simid = $("simid").value;
      const model = $("model").value;
      const metric = $("metric").value;
      const n = $("n").value;

      const href = `../${cls}/${simid}_${model}_${metric}_n${n}.html`;
      $("out").href = href;
      $("out").textContent = href;

      const q = new URLSearchParams({ cls, simid, model, metric, n });
      history.replaceState(null, "", `?${q.toString()}`);
    }

    function loadFromUrl() {
      const q = new URLSearchParams(location.search);

      if (q.get("cls")) $("cls").value = q.get("cls");
      fillIds();

      if (q.get("simid")) $("simid").value = q.get("simid");
      if (q.get("model")) $("model").value = q.get("model");
      if (q.get("metric")) $("metric").value = q.get("metric");
      if (q.get("n")) $("n").value = q.get("n");

      updateLink();
    }

    $("cls").addEventListener("change", () => {
      fillIds();
      updateLink();
    });

    $("simid").addEventListener("change", updateLink);
    $("model").addEventListener("change", updateLink);
    $("metric").addEventListener("change", updateLink);
    $("n").addEventListener("change", updateLink);

    loadFromUrl();
  </script>
</body>
</html>
